name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
assignees:
  - PoomsXP
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
        - MacOS Intel
        - MacOS Arm64
        - Windows x64
        - Windows ia32
        - Debian Based Arm64 + Amd64
        - Linux x86_64 + Arm64 (Appimage)
      default: 3
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output (errors)
      description: Please paste any errors you get in the logs when the bug occurs. Instructions to access logs can be found in the README
      render: shell
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
